services:
  postgres-test:
    image: postgres:16-alpine
    container_name: handwerk-test-db
    environment:
      POSTGRES_USER: handwerk_test
      POSTGRES_PASSWORD: handwerk_test
      POSTGRES_DB: handwerk_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handwerk_test"]
      interval: 2s
      timeout: 5s
      retries: 10
