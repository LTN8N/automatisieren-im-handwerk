services:
  postgres:
    image: postgres:16-alpine
    container_name: handwerk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: handwerk
      POSTGRES_PASSWORD: handwerk
      POSTGRES_DB: handwerk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
