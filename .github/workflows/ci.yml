name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: TypeScript Check
        run: pnpm tsc --noEmit

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: handwerk_test
          POSTGRES_PASSWORD: handwerk_test
          POSTGRES_DB: handwerk_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U handwerk_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://handwerk_test:handwerk_test@localhost:5433/handwerk_test?schema=public
      AUTH_SECRET: ci-test-secret-nicht-fuer-produktion
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      OPENAI_API_KEY: sk-test-dummy
      ANTHROPIC_API_KEY: sk-ant-test-dummy
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: test@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Database Migrations
        run: pnpm prisma db push --skip-generate

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E Tests
        run: pnpm exec playwright test

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
